name: Mirror Higress Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Higress version to mirror (e.g. 2.0.0)"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - higress
          - pilot
          - gateway
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CI_DOCKERHUB_PASSWORD }}

      - name: Mirror ${{ matrix.image }}
        run: |
          skopeo copy --all \
            --authfile ~/.docker/config.json \
            "docker://higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/${{ matrix.image }}:${{ inputs.version }}" \
            "docker://docker.io/gpustack/mirrored-higress-${{ matrix.image }}:${{ inputs.version }}"
