name: Mirror Higress Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Higress version to mirror (e.g. 2.1.9)"
        required: true
        type: string
      api_server_version:
        description: "The higress's filebase api server version to mirror (e.g. 0.0.26)"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: higress
            tag: ${{ inputs.version }}
          - image: pilot
            tag: ${{ inputs.version }}
          - image: gateway
            tag: ${{ inputs.version }}
          - image: api-server
            tag: ${{ inputs.api_server_version }}
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CI_DOCKERHUB_PASSWORD }}

      - name: Mirror ${{ matrix.image }}:${{ matrix.tag }}
        run: |
          skopeo copy --all \
            --authfile ~/.docker/config.json \
            "docker://higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/${{ matrix.image }}:${{ matrix.tag }}" \
            "docker://docker.io/gpustack/mirrored-higress-${{ matrix.image }}:${{ matrix.tag }}"
