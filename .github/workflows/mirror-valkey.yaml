name: Mirror Valkey Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Valkey version to mirror (e.g. 8.1.0)"
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.CI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.CI_DOCKERHUB_PASSWORD }}

      - name: Mirror valkey:${{ inputs.version }}
        run: |
          skopeo copy --all \
            --authfile ~/.docker/config.json \
            "docker://docker.io/valkey/valkey:${{ inputs.version }}" \
            "docker://docker.io/gpustack/mirrored-valkey:${{ inputs.version }}"
